<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulnAudit — Institutional Security Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-shell" id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-shield-halved"></i>
                    VulnAudit <span class="version">V1.0</span>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="control-group">
                    <label>Audit Target</label>
                    <div class="input-wrapper">
                        <input type="url" id="repo-url" placeholder="https://github.com/user/repo" required>
                    </div>
                </div>
                
                <button id="start-audit" class="btn-primary" style="width: 100%;">
                    <i class="fa-solid fa-bolt-lightning"></i> Initialize Protocol
                </button>

                <div id="active-sessions-list" style="margin-top: 40px;">
                    <label>Active Sessions</label>
                    <div id="sessions-container">
                        <!-- Dynamic sessions list -->
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Dashboard -->
        <main class="main-dashboard">
            <header class="top-nav">
                <div class="nav-status">
                    <span class="status-indicator" id="global-status-dot"></span>
                    <span id="global-status-text">SYSTEM READY</span>
                </div>
                <div class="nav-actions">
                    <!-- Future actions like PDF export -->
                </div>
            </header>

            <section class="dashboard-content" id="dashboard-view">
                <!-- Welcome State -->
                <div id="welcome-state" class="report-panel" style="text-align: center; margin-top: 10vh;">
                    <i class="fa-solid fa-satellite-dish" style="font-size: 4rem; color: var(--accent-cyan); margin-bottom: 24px;"></i>
                    <h1>Awaiting Command</h1>
                    <p style="color: var(--text-secondary); max-width: 500px; margin: 0 auto;">
                        Enter a GitHub repository URL to initiate an institutional security audit using Gemini 2.5 Flash synthesis.
                    </p>
                </div>

                <!-- Active Audit State (Stats) -->
                <div id="audit-stats" class="stats-grid" style="display: none;">
                    <div class="stat-card">
                        <div class="stat-label">Security Score</div>
                        <div class="stat-value" id="stat-score">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Files Scanned</div>
                        <div class="stat-value" id="stat-files">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Risk Level</div>
                        <div class="stat-value" id="stat-risk">--</div>
                    </div>
                </div>

                <!-- Report Content -->
                <div id="report-view" class="report-panel" style="display: none;">
                    <div id="report-html">
                        <!-- Audit findings rendered here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const repoInput = document.getElementById('repo-url');
        const startBtn = document.getElementById('start-audit');
        const statusDot = document.getElementById('global-status-dot');
        const statusText = document.getElementById('global-status-text');
        
        const welcomeState = document.getElementById('welcome-state');
        const auditStats = document.getElementById('audit-stats');
        const reportView = document.getElementById('report-view');
        const reportHtml = document.getElementById('report-html');
        
        let currentSessionId = null;

        startBtn.addEventListener('click', async () => {
            const url = repoInput.value;
            if (!url) return;

            startBtn.disabled = true;
            statusDot.classList.add('busy');
            statusText.innerText = 'INITIALIZING...';

            try {
                const res = await fetch('/api/audit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ repo_url: url })
                });
                const data = await res.json();
                currentSessionId = data.session_id;
                pollStatus();
            } catch (err) {
                console.error(err);
                statusText.innerText = 'ERROR';
                startBtn.disabled = false;
            }
        });

        async function pollStatus() {
            if (!currentSessionId) return;

            try {
                const res = await fetch(`/api/session/${currentSessionId}`);
                const data = await res.json();

                statusText.innerText = data.message.toUpperCase();
                
                if (data.status === 'complete') {
                    renderReport(data);
                } else if (data.status === 'error') {
                    alert('Audit failed: ' + data.message);
                    resetUI();
                } else {
                    setTimeout(pollStatus, 2000);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderReport(data) {
            statusDot.classList.remove('busy');
            startBtn.disabled = false;
            
            welcomeState.style.display = 'none';
            auditStats.style.display = 'grid';
            reportView.style.display = 'block';
            
            document.getElementById('stat-score').innerText = (10 - data.risk_score).toFixed(1);
            document.getElementById('stat-risk').innerText = data.risk_score > 7 ? 'CRITICAL' : data.risk_score > 4 ? 'MEDIUM' : 'LOW';
            document.getElementById('stat-files').innerText = 'SCAN COMPLETE';
            
            reportHtml.innerHTML = data.html_report || '<h1>No findings reported.</h1>';
        }

        function resetUI() {
            statusDot.classList.remove('busy');
            statusText.innerText = 'SYSTEM READY';
            startBtn.disabled = false;
        }
    </script>
</body>
</html>
